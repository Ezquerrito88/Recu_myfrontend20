<div class="container">
  <h2>Registro</h2>

  <form (ngSubmit)="register()" #form="ngForm">
    <div>
      <label>Nombre</label>
      <input type="text" name="name" [(ngModel)]="formData.name" required />
    </div>
    <div>
      <label>Email</label>
      <input type="email" name="email" [(ngModel)]="formData.email" required />
    </div>
    <div>
      <label>Password</label>
      <input type="password" name="password" [(ngModel)]="formData.password" required minlength="6" />
    </div>
    <div>
      <label>Confirmar Password</label>
      <input type="password" name="password_confirmation" [(ngModel)]="formData.password_confirmation" required />
    </div>

    @if (error) {
      <p style="color:red">{{ error }}</p>
    }

    <button type="submit" [disabled]="form.invalid">Registrarse</button>
    <p>¿Ya tienes cuenta? <a routerLink="/login">Login</a></p>
  </form>
</div>
